name: Refresh KIS API reference docs

on:
  schedule:
    # Monday 03:00 KST
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-kis-api-docs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install doc generator dependencies
        run: python -m pip install --upgrade openpyxl

      - name: Download latest KIS OpenAPI workbook
        run: python scripts/download-kis-api-workbook.py

      - name: Regenerate LLM-friendly API docs
        run: python scripts/build-api-docs.py

      - name: Verify generated docs
        run: python scripts/verify-api-docs.py

      - name: Commit and push if changed
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- docs/kis-api '*.xlsx')" ]; then
            echo "No KIS API reference changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/kis-api
          git add -A -- "*.xlsx"

          if git diff --cached --quiet; then
            echo "No staged KIS API reference changes."
            exit 0
          fi

          git commit -m "Refresh KIS API reference docs" \
            -m "Automated weekly refresh from the KIS API_COLLECTION workbook."
          git push
